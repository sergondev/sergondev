name: Update GitHub Stats
on:
  schedule:
    - cron: "0 0 * * *"  # Rulează zilnic la miezul nopții UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update Stats
        run: curl -X GET "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&count_private=true&include_all_commits=true&token=${{ secrets.GH_STATS_PAT }}"
