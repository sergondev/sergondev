name: GitHub Metrics

on:
  schedule: [{cron: "0 6 * * *"}]  # rulează zilnic la 06:00
  workflow_dispatch:              # permite rulare manuală din GitHub UI

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub Stats Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GH_STATS_PAT }}
          user: sergondev

          # Timezone și output
          config_timezone: Europe/Bucharest
          output_action: commit

          # Conținut de bază
          base: header, repositories

          # Plugin pentru limbaje programare
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Alte opțiuni utile (extensibil)
          config_display: large
          repositories_affiliations: owner, collaborator
